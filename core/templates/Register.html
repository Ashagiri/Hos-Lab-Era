<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HLMS - Create Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
      /* Smooth frosted glass backing style */
      .glass-card {
        background-color: rgba(33, 43, 49, 0.8) !important;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      
      /* Pure custom helper styling for matched placeholders */
      .form-custom-control::placeholder {
        color: #8a99a1 !important;
      }
    </style>
  </head>
  <body>

<div class="d-flex justify-content-center align-items-center min-vh-100 px-3 py-5" 
     style="background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('A.jpeg') no-repeat center center/cover;">
  
  <div class="card mb-3 shadow-lg border-0 text-white glass-card w-100 rounded-4" style="max-width: 840px;">
    <div class="row g-0 align-items-center">
      
      <div class="col-md-5 d-none d-md-block">
        <img src="ddd.jpg" class="img-fluid h-100 object-fit-cover rounded-start-4 opacity-75" alt="Registration Banner" style="min-height: 520px;">
      </div>
      
      <div class="col-md-7">
        <div class="card-body p-4 p-sm-5 text-center">
          
          <div class="mb-3">
            <i class="fa-solid fa-user-plus display-4 text-info"></i>
          </div>
          
          <h2 class="text-white fw-bold mb-1 fs-3">Create an Account</h2>
          <p class="mb-4 text-white-50 small" style="letter-spacing: 0.5px;">Join the Hospital Laboratory Management System</p>
          
          <form>
            
            <div class="input-group mb-3 w-85 mx-auto">
              <span class="input-group-text bg-white bg-opacity-10 border-white border-opacity-25 text-secondary">
                <i class="fa-solid fa-user"></i>
              </span>
              <input type="text" id="regFullName" class="form-control form-custom-control bg-white bg-opacity-5 border-white border-opacity-25 text-white py-2.5 shadow-none" placeholder="Full Name" required autocomplete="name">
            </div>

            <div class="input-group mb-3 w-85 mx-auto">
              <span class="input-group-text bg-white bg-opacity-10 border-white border-opacity-25 text-secondary">
                <i class="fa-solid fa-envelope"></i>
              </span>
              <input type="email" id="regEmailAddress" class="form-control form-custom-control bg-white bg-opacity-5 border-white border-opacity-25 text-white py-2.5 shadow-none" placeholder="Email Address" required autocomplete="email">
            </div>
            
            <div class="input-group mb-3 w-85 mx-auto">
              <span class="input-group-text bg-white bg-opacity-10 border-white border-opacity-25 text-secondary">
                <i class="fa-solid fa-key"></i>
              </span>
              <input type="password" id="regPassword" class="form-control form-custom-control bg-white bg-opacity-5 border-white border-opacity-25 text-white py-2.5 shadow-none" placeholder="Create Password" required>
              <button class="btn btn-outline-secondary border-white border-opacity-25 bg-white bg-opacity-10 text-secondary px-3" type="button" id="toggleRegPassword">
                <i class="fa-solid fa-eye" id="regPasswordIcon"></i>
              </button>
            </div>

            <div class="input-group mb-4 w-85 mx-auto">
              <span class="input-group-text bg-white bg-opacity-10 border-white border-opacity-25 text-secondary">
                <i class="fa-solid fa-lock"></i>
              </span>
              <input type="password" id="confirmPassword" class="form-control form-custom-control bg-white bg-opacity-5 border-white border-opacity-25 text-white py-2.5 shadow-none" placeholder="Confirm Password" required>
            </div>
            
            <div class="mb-4 text-start w-85 mx-auto small">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="termsCheck" required>
                <label class="form-check-label text-white-50" for="termsCheck">
                  I agree to the <a href="#" class="text-info text-decoration-none fw-medium">Terms & Privacy Policy</a>
                </label>
              </div>
            </div>
            
            <div class="d-grid gap-3 w-85 mx-auto">
              <button class="btn btn-info btn-lg rounded-pill py-2.5 fs-6 fw-medium text-white d-flex align-items-center justify-content-center gap-2 shadow" type="submit">
                <i class="fa-solid fa-id-card"></i> Register Account
              </button>
              
              <div class="mt-2 text-white-50 small">
                Already have an account? 
                <a href="Login.html" class="text-info text-decoration-none fw-bold ms-1">Sign In</a>
              </div>
            </div>

          </form>
          
        </div>
      </div>

    </div>
  </div>

</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      const regPasswordInput = document.getElementById('regPassword');
      const confirmPasswordInput = document.getElementById('confirmPassword');
      const toggleRegPasswordBtn = document.getElementById('toggleRegPassword');
      const regPasswordIcon = document.getElementById('regPasswordIcon');

      toggleRegPasswordBtn.addEventListener('click', function () {
        const currentType = regPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        regPasswordInput.setAttribute('type', currentType);
        confirmPasswordInput.setAttribute('type', currentType);
        
        regPasswordIcon.classList.toggle('fa-eye');
        regPasswordIcon.classList.toggle('fa-eye-slash');
      });
    </script>
  </body>
</html>
