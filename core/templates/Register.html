{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HLMS - Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
      body {
        background-image: url("{% static 'fff.jpg' %}");
        background-color: #fdfdfd;
        background-repeat: no-repeat;
        background-position: center center;
        background-size: cover;
        background-attachment: fixed;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      
      .registration-card {
        max-width: 760px;
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08); 
      }

      .header-title {
        color: #0a429b;
        font-weight: 700;
        font-size: 1.85rem;
      }

      .header-icon {
        background-color: #1967d2;
        color: white;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.35rem;
      }

      .form-label {
        font-weight: 600;
        color: #2c3e50;
        font-size: 0.88rem;
        margin-bottom: 0.4rem;
      }

      .text-asterisk {
        color: #dc3545;
        margin-left: 2px;
      }

      .input-wrapper {
        position: relative;
      }

      .input-wrapper .form-control,
      .input-wrapper .form-select {
        padding-left: 2.6rem;
        border-radius: 8px;
        border: 1px solid #ced4da;
        height: 46px;
        color: #495057;
        font-size: 0.92rem;
      }

      .input-wrapper .form-control::placeholder {
        color: #999999;
      }

      .input-wrapper .form-select {
        color: #8c9399;
      }
      .input-wrapper .form-select option:not([disabled]) {
        color: #495057;
      }

      .input-wrapper .inner-icon {
        position: absolute;
        left: 1.1rem;
        top: 50%;
        transform: translateY(-50%);
        color: #888888;
        z-index: 5;
        pointer-events: none;
        font-size: 0.95rem;
      }

      .password-toggle-btn {
        position: absolute;
        right: 1.1rem;
        top: 50%;
        transform: translateY(-50%);
        color: #888888;
        cursor: pointer;
        z-index: 5;
        background: none;
        border: none;
        padding: 0;
      }

      .btn-register {
        background-color: #1967d2;
        border-color: #1967d2;
        height: 48px;
        border-radius: 8px;
        font-weight: 600;
        font-size: 0.95rem;
      }

      .btn-register:hover {
        background-color: #1557b5;
        border-color: #1557b5;
      }

      .form-check-input:checked {
        background-color: #1967d2;
        border-color: #1967d2;
      }
    </style>
  </head>
  <body>

<div class="container d-flex justify-content-center align-items-center min-vh-100 py-4">
  <div class="registration-card w-100 p-4 p-md-5">
    
    <div class="d-flex align-items-center gap-3 pb-3 mb-4 border-bottom border-light-subtle">
      <div class="header-icon">
        <i class="fa-solid fa-user"></i>
      </div>
      <h1 class="header-title m-0">Create an Account</h1>
    </div>

    <!-- Added proper method handling and validation token -->
    <form method="POST">
      {% csrf_token %}
      
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label for="regFullName" class="form-label">Full Name <span class="text-asterisk">:</span></label>
          <div class="input-wrapper">
            <i class="fa-solid fa-user inner-icon"></i>
            <input type="text" id="regFullName" class="form-control" placeholder="Enter full name" required autocomplete="name">
          </div>
        </div>
        
        <div class="col-md-6">
           <label for="regDOB" class="form-label">Date of Birth <span class="text-asterisk">:</span></label>
           <div class="input-wrapper">
             <i class="fa-solid fa-calendar-days inner-icon"></i>
             <input type="date" id="regDOB" class="form-control" required autocomplete="bday">
           </div>
        </div>
      </div>

      <div class="row g-3 mb-3">
        <!-- Email Address -->
        <div class="col-md-6">
          <label for="regEmailAddress" class="form-label">Email Address <span class="text-asterisk">:</span></label>
          <div class="input-wrapper">
            <i class="fa-solid fa-envelope inner-icon"></i>
            <input type="email" id="regEmailAddress" class="form-control" placeholder="Enter email address" required autocomplete="email">
          </div>
        </div>
        <!-- Phone Number -->
        <div class="col-md-6">
          <label for="regPhone" class="form-label">Phone Number <span class="text-asterisk">:</span></label>
          <div class="input-wrapper">
            <i class="fa-solid fa-phone inner-icon"></i>
            <input type="tel" id="regPhone" class="form-control" placeholder="Enter phone number" required autocomplete="tel">
          </div>
        </div>
      </div>

      <div class="row g-3 mb-3">
        <!-- Password -->
        <div class="col-md-6">
          <label for="regPassword" class="form-label">Password <span class="text-asterisk">:</span></label>
          <div class="input-wrapper">
            <i class="fa-solid fa-lock inner-icon"></i>
            <input type="password" id="regPassword" class="form-control pe-5" placeholder="Create a password" required>
            <button type="button" class="password-toggle-btn" id="toggleRegPassword">
              <i class="fa-solid fa-eye-slash" id="regPasswordIcon"></i>
            </button>
          </div>
        </div>
        <!-- Confirm Password -->
        <div class="col-md-6">
          <label for="confirmPassword" class="form-label">Confirm Password <span class="text-asterisk">:</span></label>
          <div class="input-wrapper">
            <i class="fa-solid fa-lock inner-icon"></i>
            <input type="password" id="confirmPassword" class="form-control pe-5" placeholder="Confirm your password" required>
            <button type="button" class="password-toggle-btn" id="toggleConfirmPassword">
              <i class="fa-solid fa-eye-slash" id="confirmPasswordIcon"></i>
            </button>
          </div>
        </div>
      </div>

      <div class="row g-3 mb-3">
        <!-- Age Field -->
        <div class="col-md-6">
          <label for="regAge" class="form-label">Age<span class="text-asterisk">:</span></label>
          <div class="input-wrapper">
            <i class="fa-solid fa-user-plus inner-icon"></i>
            <input type="number" id="regAge" class="form-control" placeholder="Enter your age" required>
          </div>
        </div>
        <!-- Gender Selection -->
        <div class="col-md-6">
          <label for="regGender" class="form-label">Gender<span class="text-asterisk">:</span></label>
          <div class="input-wrapper">
            <i class="fa-solid fa-building inner-icon"></i>
            <select id="regGender" class="form-select" required>
              <option value="" disabled selected hidden>Select gender</option>
              <option value="male">Male</option>
              <option value="female">Female</option>
              <option value="other">Other</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Consent Agreement -->
      <div class="mb-4 form-check text-start">
        <input type="checkbox" class="form-check-input" id="termsCheck" required>
        <label class="form-check-label text-dark small label-checkbox" for="termsCheck">
          I agree to the <a href="#" class="text-primary text-decoration-none fw-semibold">Terms & Conditions</a> and <a href="#" class="text-primary text-decoration-none fw-semibold">Privacy Policy</a>
        </label>
      </div>

      <!-- Actions Section -->
      <div class="d-grid gap-3">
        <button class="btn btn-primary btn-register d-flex align-items-center justify-content-center gap-2 shadow-sm text-white" type="submit">
          <i class="fa-solid fa-user-plus"></i> Register
        </button>
        
        <div class="text-center text-secondary small">
          Already have an account? 
          <!-- Linked with dynamic Django url routing -->
          <a href="{% url 'login' %}" class="text-primary text-decoration-none fw-semibold ms-1">Login</a>
        </div>
      </div>
    </form>

  </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      function bindVisibilityToggle(inputId, toggleId, iconId) {
        const passwordInput = document.getElementById(inputId);
        const toggleButton = document.getElementById(toggleId);
        const iconElement = document.getElementById(iconId);

        toggleButton.addEventListener('click', function () {
          const typeAttr = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
          passwordInput.setAttribute('type', typeAttr);
          
          iconElement.classList.toggle('fa-eye-slash');
          iconElement.classList.toggle('fa-eye');
        });
      }

      bindVisibilityToggle('regPassword', 'toggleRegPassword', 'regPasswordIcon');
      bindVisibilityToggle('confirmPassword', 'toggleConfirmPassword', 'confirmPasswordIcon');
      
      const selectElements = document.querySelectorAll('.form-select');
      selectElements.forEach(select => {
        select.addEventListener('change', function() {
          if (this.value !== "") {
            this.style.color = "#495057";
          }
        });
      });
    </script>
  </body>
</html>
