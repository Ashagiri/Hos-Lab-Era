<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Lab Test - Hos-Lab-Era</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #070913;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .booking-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            border-radius: 12px;
            padding: 12px 15px;
        }
        .form-control:focus, .form-select:focus {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            border-color: #8ab4f8;
            box-shadow: none;
        }
        .btn-submit {
            background: linear-gradient(135deg, #4285f4 0%, #9b51e0 50%, #e051b8 100%);
            border: none;
            color: white;
            padding: 14px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(66, 133, 244, 0.4);
        }
        option {
            background: #070913;
            color: #fff;
        }
    </style>
</head>
<body>

<div class="booking-card">
    <div class="text-center mb-4">
        <i class="fa-solid fa-calendar-check text-info fa-3x mb-2"></i>
        <h3 class="fw-bold">Schedule Diagnostic Test</h3>
        <p class="text-muted small">Select your test module parameters to submit appointment logs directly to our lab officers.</p>
    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-info bg-dark text-info border-secondary text-center py-2 small">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label text-secondary small fw-semibold">Available Laboratory Test</label>
            <select name="lab_test" class="form-select" required>
                <option value="" disabled selected>-- Choose from registered tests --</option>
                {% for test in available_tests %}
                    <option value="{{ test.id }}">{{ test.test_name }} (Rs. {{ test.price }})</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label text-secondary small fw-semibold">Appointment Target Date</label>
            <input type="date" name="appointment_date" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label text-secondary small fw-semibold">Preferred Window Slot</label>
            <select name="time_slot" class="form-select" required>
                <option value="Morning (8:00 AM - 12:00 PM)">Morning (8:00 AM - 12:00 PM)</option>
                <option value="Afternoon (12:00 PM - 4:00 PM)">Afternoon (12:00 PM - 4:00 PM)</option>
            </select>
        </div>

        <div class="mb-4">
            <label class="form-label text-secondary small fw-semibold">Patient Directives / Medical Notes (Optional)</label>
            <textarea name="additional_notes" class="form-control" rows="3" placeholder="Any specific symptoms, guidelines, or fasting notes..."></textarea>
        </div>

        <button type="submit" class="btn btn-submit w-100 fw-bold fs-6">Confirm Lab Pre-Booking</button>
    </form>

    <div class="text-center mt-4">
        <a href="{% url 'home' %}" class="text-decoration-none text-muted small"><i class="fa-solid fa-arrow-left me-1"></i> Return to Main Hub</a>
    </div>
</div>

</body>
</html>
