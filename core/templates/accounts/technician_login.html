{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HLMS - Staff Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
      body, html {
        height: 100%;
        margin: 0;
        font-family: system-ui, -apple-system, sans-serif;
      }

      /* Background image overlay */
      .bg-overlay-wrapper {
        background-image: url("{% static 'fff.jpg' %}");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        min-height: 100vh;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 15px;
      }

      /* Clean Light-Mode Floating Card */
      .form-card {
        background-color: rgba(255, 255, 255, 0.96);
        border-radius: 12px;
        width: 100%;
        max-width: 480px;
        padding: 45px 40px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        color: #212529;
      }

      .card-title-accent {
        color: #1e3d59;
        font-weight: 700;
      }

      .field-label {
        font-weight: 600;
        color: #333333;
        font-size: 0.9rem;
        margin-bottom: 6px;
      }

      .input-group-custom {
        display: flex;
        align-items: center;
        border: 1px solid #ced4da;
        border-radius: 6px;
        background-color: #f8f9fa;
        height: 44px;
        overflow: hidden;
      }

      .input-group-custom:focus-within {
        border-color: #86b7fe;
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
      }

      .input-group-custom .icon-addon {
        color: #1e3d59;
        width: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-right: 1px solid #ced4da;
      }

      .input-group-custom .form-control-clean {
        border: none;
        outline: none;
        width: 100%;
        padding: 0 12px;
        color: #212529;
        font-size: 0.95rem;
        background: transparent;
      }

      .password-eye-btn {
        background: transparent;
        border: none;
        color: #6c757d;
        padding-right: 12px;
        cursor: pointer;
      }

      /* Prominent Staff Authentication Button */
      .btn-primary-action {
        background-color: #ffc107;
        color: #212529;
        border: none;
        border-radius: 6px;
        height: 45px;
        font-weight: 600;
        font-size: 1rem;
        transition: background-color 0.2s ease;
      }

      .btn-primary-action:hover {
        background-color: #e0a800;
      }
    </style>
  </head>
  <body>

<div class="bg-overlay-wrapper">
  <div class="form-card">
    
    <div class="d-flex align-items-center gap-3 mb-4">
      <div class="fs-2" style="color: #1e3d59;"><i class="fa-solid fa-user-shield"></i></div>
      <h3 class="m-0 card-title-accent">Staff Portal</h3>
    </div>

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-danger py-2 small" role="alert">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      
      <div class="mb-3">
        <label class="field-label">Username :</label>
        <div class="input-group-custom">
          <div class="icon-addon"><i class="fa-solid fa-user"></i></div>
          <input type="text" name="username" class="form-control-clean" placeholder="Enter username" required autocomplete="username">
        </div>
      </div>

      <div class="mb-4">
        <label class="field-label">Password :</label>
        <div class="input-group-custom">
          <div class="icon-addon"><i class="fa-solid fa-lock"></i></div>
          <input type="password" id="loginPass" name="password" class="form-control-clean" placeholder="Enter password" required autocomplete="current-password">
          <button type="button" class="password-eye-btn" id="toggleLoginPass">
            <i class="fa-solid fa-eye-slash" id="loginPassIcon"></i>
          </button>
        </div>
      </div>

      <div class="d-grid">
        <button class="btn btn-primary-action d-flex align-items-center justify-content-center gap-2 shadow-sm" type="submit">
          <i class="fa-solid fa-key"></i> Authenticate
        </button>
      </div>
    </form>
  </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const loginPass = document.getElementById('loginPass');
      const toggleLoginPass = document.getElementById('toggleLoginPass');
      const loginPassIcon = document.getElementById('loginPassIcon');

      toggleLoginPass.addEventListener('click', function() {
        const check = loginPass.type === 'password';
        loginPass.type = check ? 'text' : 'password';
        loginPassIcon.classList.toggle('fa-eye-slash', !check);
        loginPassIcon.classList.toggle('fa-eye', check);
      });
    </script>
  </body>
</html>
