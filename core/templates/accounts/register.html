{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HLMS - Create Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
      body {
        background-color: #1e2229;
        font-family: system-ui, -apple-system, sans-serif;
      }
      
      .main-wrapper {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 15px;
      }

      .custom-card {
        background-color: #262c36;
        border-radius: 16px;
        width: 100%;
        max-width: 1000px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        overflow: hidden;
      }

      .banner-side {
        background-color: #1a1e24;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 30px;
      }

      .banner-side img {
        width: 100%;
        max-height: 420px;
        object-fit: cover;
        border-radius: 12px;
      }

      .form-side {
        padding: 40px;
        color: #ffffff;
      }

      .header-icon {
        color: #00cec9;
        font-size: 2.8rem;
        margin-bottom: 10px;
      }

      .custom-input-group {
        display: flex;
        background-color: #ffffff;
        border-radius: 6px;
        overflow: hidden;
        height: 44px;
      }

      .custom-input-group .icon-box {
        background-color: #4a5568;
        color: #cbd5e1;
        width: 46px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .custom-input-group .form-control,
      .custom-input-group .form-select {
        border: none;
        background: transparent;
        color: #1e2229;
        font-weight: 500;
        padding-left: 12px;
      }

      .custom-input-group .form-control::placeholder {
        color: #94a3b8;
      }

      .custom-input-group .form-control:focus,
      .custom-input-group .form-select:focus {
        box-shadow: none;
        background: transparent;
      }

      .password-toggle-addon {
        background: transparent;
        border: none;
        color: #64748b;
        padding-right: 12px;
        display: flex;
        align-items: center;
        cursor: pointer;
      }

      .form-check-input {
        background-color: transparent;
        border: 2px solid #00cec9;
      }

      .form-check-input:checked {
        background-color: #00cec9;
        border-color: #00cec9;
      }

      .btn-submit {
        background-color: #00cec9;
        color: #ffffff;
        border: none;
        border-radius: 30px;
        height: 46px;
        font-weight: 700;
        transition: all 0.2s ease;
      }

      .btn-submit:hover {
        background-color: #00b894;
        color: #ffffff;
      }

      .accent-link {
        color: #00cec9;
        text-decoration: none;
        font-weight: 600;
      }

      .accent-link:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>

<div class="main-wrapper">
  <div class="custom-card">
    <div class="row g-0 align-items-center">
      
      <div class="col-lg-5 banner-side d-none d-lg-flex">
        <img src="{% static 'fff.jpg' %}" alt="Registration Banner">
      </div>

      <div class="col-lg-7 form-side">
        <div class="text-center mb-4">
          <div class="header-icon">
            <i class="fa-solid fa-user-plus"></i>
          </div>
          <h3 class="fw-bold m-0">Create an Account</h3>
          <p class="text-white-50 small mt-1">Join the Hospital Laboratory Management System</p>
        </div>

        <form method="POST">
          {% csrf_token %}
          
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <div class="custom-input-group">
                <div class="icon-box"><i class="fa-solid fa-user"></i></div>
                <input type="text" name="full_name" class="form-control" placeholder="Full Name" required>
              </div>
            </div>
            <div class="col-md-6">
              <div class="custom-input-group">
                <div class="icon-box"><i class="fa-solid fa-calendar-days"></i></div>
                <input type="date" name="dob" class="form-control" required>
              </div>
            </div>
          </div>

          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <div class="custom-input-group">
                <div class="icon-box"><i class="fa-solid fa-envelope"></i></div>
                <input type="email" name="email" class="form-control" placeholder="Email Address" required>
              </div>
            </div>
            <div class="col-md-6">
              <div class="custom-input-group">
                <div class="icon-box"><i class="fa-solid fa-phone"></i></div>
                <input type="tel" name="phone" class="form-control" placeholder="Phone Number" required>
              </div>
            </div>
          </div>

          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <div class="custom-input-group">
                <div class="icon-box"><i class="fa-solid fa-key"></i></div>
                <input type="password" id="regPassword" name="password" class="form-control" placeholder="Create Password" required>
                <button type="button" class="password-toggle-addon" id="toggleRegPassword">
                  <i class="fa-solid fa-eye-slash" id="regPasswordIcon"></i>
                </button>
              </div>
            </div>
            <div class="col-md-6">
              <div class="custom-input-group">
                <div class="icon-box"><i class="fa-solid fa-lock"></i></div>
                <input type="password" id="confirmPassword" name="confirm_password" class="form-control" placeholder="Confirm Password" required>
                <button type="button" class="password-toggle-addon" id="toggleConfirmPassword">
                  <i class="fa-solid fa-eye-slash" id="confirmPasswordIcon"></i>
                </button>
              </div>
            </div>
          </div>

          <div class="row g-3 mb-4">
            <div class="col-md-6">
              <div class="custom-input-group">
                <div class="icon-box"><i class="fa-solid fa-circle-info"></i></div>
                <input type="number" name="age" class="form-control" placeholder="Age" required min="1">
              </div>
            </div>
            <div class="col-md-6">
              <div class="custom-input-group">
                <div class="icon-box"><i class="fa-solid fa-venus-mars"></i></div>
                <select name="gender" class="form-select" required>
                  <option value="" disabled selected hidden>Select Gender</option>
                  <option value="male">Male</option>
                  <option value="female">Female</option>
                  <option value="other">Other</option>
                </select>
              </div>
            </div>
          </div>

          <div class="mb-4 form-check">
            <input type="checkbox" class="form-check-input" id="termsCheck" required>
            <label class="form-check-label small text-white-50" for="termsCheck">
              I agree to the <a href="#" class="accent-link">Terms & Privacy Policy</a>
            </label>
          </div>

          <div class="d-grid gap-3">
            <button class="btn btn-submit shadow" type="submit">Register Account</button>
            <div class="text-center text-white-50 small">
              Already have an account? <a href="{% url 'login' %}" class="accent-link ms-1">Sign In</a>
            </div>
          </div>
        </form>
      </div>

    </div>
  </div>
</div>

    <script>
      function setupPasswordToggle(inputId, buttonId, iconId) {
        const input = document.getElementById(inputId);
        const button = document.getElementById(buttonId);
        const icon = document.getElementById(iconId);
        button.addEventListener('click', function() {
          const isPassword = input.type === 'password';
          input.type = isPassword ? 'text' : 'password';
          icon.classList.toggle('fa-eye-slash', !isPassword);
          icon.classList.toggle('fa-eye', isPassword);
        });
      }
      setupPasswordToggle('regPassword', 'toggleRegPassword', 'regPasswordIcon');
      setupPasswordToggle('confirmPassword', 'toggleConfirmPassword', 'confirmPasswordIcon');
    </script>
  </body>
</html>
